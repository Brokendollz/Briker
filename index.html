<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRIKER - Steam Tower</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-overlay">
            <div id="health-bar">
                <div id="health-fill"></div>
            </div>
            <div id="height-indicator">
                <span id="height-text">0m</span>
            </div>
        </div>
        <div id="mobile-controls">
            <div class="mobile-left">
                <button id="btn-left" class="mobile-btn">&#9664;</button>
                <button id="btn-right" class="mobile-btn">&#9654;</button>
            </div>
            <button id="btn-jump" class="mobile-btn mobile-jump">JUMP</button>
        </div>
        <div id="start-screen" class="screen">
            <div class="title-container">
                <h1 class="game-title">BRIKER</h1>
                <h2 class="game-subtitle">STEAM TOWER</h2>
                <div class="gear-divider">&#9881; &#9881; &#9881;</div>
                <p class="instructions">Climb to the top. Reach the goal.</p>
                <p class="controls-info">
                    <strong>WASD / Arrow Keys</strong> - Move<br>
                    <strong>SPACE / W / UP</strong> - Jump<br>
                    <strong>Wall Jump</strong> - Jump while sliding on walls
                </p>
                <div class="stage-select">
                    <p class="stage-label">SELECT STAGE</p>
                    <div class="stage-buttons">
                        <button id="stage-steampunk" class="steam-btn stage-btn active">STEAM TOWER</button>
                        <button id="stage-icecave" class="steam-btn stage-btn">FROZEN DEPTHS</button>
                    </div>
                </div>
                <button id="start-btn" class="steam-btn">ENGAGE ENGINES</button>
            </div>
        </div>
        <div id="win-screen" class="screen hidden">
            <div class="title-container">
                <h1 class="game-title">TOWER CLEARED</h1>
                <div class="gear-divider">&#9881; &#9881; &#9881;</div>
                <p class="instructions" id="win-time">Time: 0:00</p>
                <button id="restart-win-btn" class="steam-btn">ASCEND AGAIN</button>
            </div>
        </div>
        <div id="death-screen" class="screen hidden">
            <div class="title-container">
                <h1 class="game-title" style="color:#cc3333;">GEARS JAMMED</h1>
                <div class="gear-divider">&#9881; &#9881; &#9881;</div>
                <p class="instructions">The machine claims another soul.</p>
                <button id="restart-death-btn" class="steam-btn">RETRY</button>
            </div>
        </div>
    </div>
    <script src="js/design.js"></script>
    <script src="js/stages.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
